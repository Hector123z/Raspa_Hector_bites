<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premio Héctor Bites</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f1f8e9;
}

canvas{
margin-top:20px;
border-radius:10px;
border:2px solid #000; /* 👈 para que SIEMPRE se vea */
background:#888; /* 👈 fondo gris visible */
}
</style>
</head>

<body>

<h2>🎁 Raspa y gana</h2>
<p>Raspa el cuadro 👇</p>

<canvas id="canvas" width="300" height="150"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// 🎯 PROBABILIDAD
let random = Math.random();
let premio = "";

if(random < 0.025){
premio = "🎉 GANASTE 1 GALLETA GRANDE";
}else if(random < 0.05){
premio = "🎉 GANASTE 3 MINI GALLETAS";
}else{
premio = "😢 Sigue intentando";
}

// 🧾 TEXTO OCULTO
function dibujarPremio(){
ctx.globalCompositeOperation = "source-over";
ctx.clearRect(0,0,300,150);

ctx.fillStyle = "#fff";
ctx.fillRect(0,0,300,150);

ctx.fillStyle = "#000";
ctx.font = "bold 18px Arial";
ctx.textAlign = "center";
ctx.fillText(premio,150,80);

// capa gris encima
ctx.fillStyle = "#888";
ctx.fillRect(0,0,300,150);
}

dibujarPremio();

// 🎮 RASPAR
function raspar(e){
let rect = canvas.getBoundingClientRect();
let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

ctx.globalCompositeOperation = "destination-out";
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener("mousemove", raspar);
canvas.addEventListener("touchmove", raspar);
</script>

</body>
</html>
