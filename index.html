<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Bites | Raspa y Gana</title>
    <style>
        :root { --v: #1b5e20; --c: #f1f8e9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--c); text-align: center; padding: 20px; }
        .box { background: white; border: 3px solid var(--v); border-radius: 20px; padding: 20px; max-width: 350px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 85%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 18px; text-transform: uppercase; font-weight: bold; }
        button { background: var(--v); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 16px; }
        #juego { display: none; margin-top: 20px; position: relative; width: 300px; height: 150px; margin-left: auto; margin-right: auto; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 15px; touch-action: none; cursor: crosshair; }
        #premio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #ddd; border-radius: 15px; z-index: 1; background: white; font-size: 1.2rem; }
        #error-msg { display: none; color: red; background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="pantalla-error" style="display:none;">
        <h1 style="color:red;">❌ Acceso Denegado</h1>
        <p>Escanea el QR oficial de Héctor Bites.</p>
    </div>

    <div id="contenido-qr" class="box">
        <h2>🎟️ Héctor Bites</h2>
        <p>Ingresa el código de tu galleta:</p>
        <input type="text" id="codigo-input" placeholder="Ej: HB-7A2">
        <button onclick="verificarCodigo()">ACTIVAR RASPADO</button>

        <div id="juego">
            <div id="premio"></div>
            <canvas id="canvas" width="300" height="150"></canvas>
        </div>
        <div id="area-wsp" style="margin-top:20px;"></div>
    </div>

<script>
    // Seguridad de acceso por QR
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('access') !== 'true') {
        document.getElementById('contenido-qr').style.display = 'none';
        document.getElementById('pantalla-error').style.display = 'block';
    }

    function verificarCodigo() {
        const cod = document.getElementById("codigo-input").value.trim().toUpperCase();
        if(cod.length < 3) return alert("Ingresa un código válido");

        // Fórmula matemática de probabilidad (Hash)
        let hash = 0;
        for (let i = 0; i < cod.length; i++) {
            hash = cod.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        // 3% de probabilidad basado en el código ingresado
        const esGanador = (Math.abs(hash) % 100) < 3; 

        document.getElementById("juego").style.display = "block";
        const txtPremio = document.getElementById("premio");
        const areaWsp = document.getElementById("area-wsp");

        if (esGanador) {
            txtPremio.innerHTML = "🎉 ¡GANASTE!<br>1 GALLETA";
            txtPremio.style.color = "green";
            areaWsp.innerHTML = `<button onclick="enviarWSP('${cod}')" style="background:#25d366">📲 RECLAMAR POR WHATSAPP</button>`;
        } else {
            txtPremio.innerHTML = "😢 SIGUE INTENTANDO";
            txtPremio.style.color = "#777";
            areaWsp.innerHTML = "<p style='color:gray; font-size:12px;'>¡Suerte para la próxima!</p>";
        }
        iniciarCanvas();
    }

    function iniciarCanvas() {
        const c = document.getElementById("canvas");
        const ctx = c.getContext("2d");
        ctx.globalCompositeOperation = "source-over"; // Reset para nuevo intento
        ctx.fillStyle = "#999"; 
        ctx.fillRect(0,0,300,150);
        ctx.fillStyle = "white";
        ctx.font = "bold 18px Arial";
        ctx.textAlign = "center";
        ctx.fillText("RASPA AQUÍ", 150, 85);

        const raspar = (e) => {
            const rect = c.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            ctx.globalCompositeOperation = "destination-out";
            ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill();
        };
        c.ontouchmove = (e) => { e.preventDefault(); raspar(e); };
        c.onmousemove = (e) => { if(e.buttons==1) raspar(e); };
    }

    function enviarWSP(c) {
        const tel = "51975754119"; // TU NÚMERO REAL
        const msg = `¡Héctor, gané! Mi código es: ${c}`;
        window.location.href = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
