<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa y Gana</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f1f8e9;
}

canvas{
margin-top:20px;
border:2px solid black;
border-radius:10px;
touch-action:none;
}

#resultado{
margin-top:15px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>🎁 Raspa y gana</h2>
<p>Raspa el cuadro 👇</p>

<canvas id="canvas" width="300" height="150"></canvas>

<p id="resultado">Raspa para descubrir tu premio...</p>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let resultadoTexto = document.getElementById("resultado");

// 🎯 PROBABILIDAD
let r = Math.random();
let premio = "";

if(r < 0.025){
premio = "🎉 GANASTE 1 GALLETA GRANDE";
}else if(r < 0.05){
premio = "🎉 GANASTE 3 MINI GALLETAS";
}else{
premio = "😢 Sigue intentando";
}

// 👇 MOSTRAR RESULTADO ABAJO
resultadoTexto.innerText = premio;

// 🧾 DIBUJAR FONDO
ctx.fillStyle = "#fff";
ctx.fillRect(0,0,300,150);

ctx.fillStyle = "#000";
ctx.font = "bold 18px Arial";
ctx.textAlign = "center";
ctx.fillText("RASPA AQUÍ",150,80);

// 🟫 CAPA GRIS
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "#888";
ctx.fillRect(0,0,300,150);

// 🎮 RASPAR
function raspar(x,y){
ctx.globalCompositeOperation = "destination-out";
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

// 🖱️ PC
canvas.addEventListener("mousedown", () => {
canvas.addEventListener("mousemove", mover);
});

canvas.addEventListener("mouseup", () => {
canvas.removeEventListener("mousemove", mover);
});

function mover(e){
let rect = canvas.getBoundingClientRect();
raspar(e.clientX - rect.left, e.clientY - rect.top);
}

// 📱 CELULAR
canvas.addEventListener("touchmove", e => {
e.preventDefault();
let rect = canvas.getBoundingClientRect();
let touch = e.touches[0];
raspar(touch.clientX - rect.left, touch.clientY - rect.top);
});
</script>

</body>
</html>
