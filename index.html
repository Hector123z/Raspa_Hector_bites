<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa y Gana</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f1f8e9;
}

canvas{
margin-top:20px;
border:2px solid black;
border-radius:10px;
touch-action: none; /* 👈 clave para móviles */
}
</style>
</head>

<body>

<h2>🎁 Raspa y gana</h2>
<p>Raspa el cuadro 👇</p>

<canvas id="canvas" width="300" height="150"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// 🎯 PROBABILIDADES
let r = Math.random();
let premio = "";

if(r < 0.025){
premio = "🎉 GANASTE 1 GRANDE";
}else if(r < 0.05){
premio = "🎉 GANASTE 3 MINI";
}else{
premio = "😢 Sigue intentando";
}

// 🧾 DIBUJAR FONDO (PREMIO)
ctx.fillStyle = "#fff";
ctx.fillRect(0,0,300,150);

ctx.fillStyle = "#000";
ctx.font = "bold 18px Arial";
ctx.textAlign = "center";
ctx.fillText(premio,150,80);

// 🟫 CAPA GRIS ENCIMA
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "#888";
ctx.fillRect(0,0,300,150);

// 🎮 FUNCION RASPAR
function raspar(x,y){
ctx.globalCompositeOperation = "destination-out";
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

// 🖱️ MOUSE
canvas.addEventListener("mousedown", e => {
canvas.addEventListener("mousemove", moverMouse);
});

canvas.addEventListener("mouseup", () => {
canvas.removeEventListener("mousemove", moverMouse);
});

function moverMouse(e){
let rect = canvas.getBoundingClientRect();
raspar(e.clientX - rect.left, e.clientY - rect.top);
}

// 📱 TOUCH (CELULAR)
canvas.addEventListener("touchstart", e => {
e.preventDefault();
});

canvas.addEventListener("touchmove", e => {
e.preventDefault();
let rect = canvas.getBoundingClientRect();
let touch = e.touches[0];
raspar(touch.clientX - rect.left, touch.clientY - rect.top);
});
</script>

</body>
</html>
