<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Bites | Raspa y Gana VIP</title>
    <style>
        :root {
            --verde: #1b5e20;
            --claro: #f1f8e9;
            --dorado: #ffa000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: var(--claro);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .ticket-box {
            background: white;
            border: 3px solid var(--verde);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .codigo-display {
            background: #eee;
            padding: 10px;
            font-family: monospace;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 10px;
            margin: 15px 0;
            color: #333;
            border: 1px dashed #999;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .btn-activar {
            background: var(--verde);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
        }

        /* AREA DE RASPADO */
        #contenedor-juego {
            display: none;
            position: relative;
            width: 300px;
            height: 150px;
            margin: 20px auto;
        }

        #capa-premio {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 2px solid #ddd;
            z-index: 1;
        }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            border-radius: 15px;
            touch-action: none;
            cursor: crosshair;
        }

        .mensaje-info {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ticket-box">
        <h2>🎟️ Ticket de Regalo</h2>
        <p>Introduce el código generado por tu QR:</p>
        
        <div id="codigo-generado" class="codigo-display">HB-XXXX-X</div>

        <div id="fase-validacion">
            <input type="text" id="input-cliente" placeholder="Escribe el código">
            <button class="btn-activar" onclick="validarTicket()">ACTIVAR RASPADO</button>
        </div>

        <div id="contenedor-juego">
            <div id="capa-premio">
                <span id="texto-premio" style="font-weight:bold; font-size:1.2rem; text-align:center; padding:10px;"></span>
            </div>
            <canvas id="canvas" width="300" height="150"></canvas>
        </div>

        <p id="status-msg" class="mensaje-info">El código solo es válido por 24 horas.</p>
    </div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const inputCliente = document.getElementById("input-cliente");
    const displayCodigo = document.getElementById("codigo-generado");
    const textoPremio = document.getElementById("texto-premio");
    const contenedorJuego = document.getElementById("contenedor-juego");
    const faseValidacion = document.getElementById("fase-validacion");

    // 1. GENERAR CÓDIGO DIFÍCIL (Alfanumérico complejo)
    function generarCodigoDificil() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let segment1 = "";
        let segment2 = "";
        for(let i=0; i<4; i++) segment1 += chars.charAt(Math.floor(Math.random() * chars.length));
        for(let i=0; i<2; i++) segment2 += chars.charAt(Math.floor(Math.random() * chars.length));
        return `HB-${segment1}-${segment2}`;
    }

    // Inicializar código en la pantalla
    const CODIGO_ACTUAL = generarCodigoDificil();
    displayCodigo.innerText = CODIGO_ACTUAL;

    // 2. REVISAR SI YA EXISTE UN PREMIO ASIGNADO A ESTE DISPOSITIVO
    const sesionGuardada = localStorage.getItem("sesion_bites");
    
    function validarTicket() {
        const inputVal = inputCliente.value.trim().toUpperCase();
        
        if (inputVal !== CODIGO_ACTUAL) {
            alert("❌ Código inválido. Copia exactamente el código de arriba.");
            return;
        }

        // Si el código es correcto, activar raspa
        faseValidacion.style.display = "none";
        contenedorJuego.style.display = "block";
        
        if (sesionGuardada) {
            // Si ya raspó antes de refrescar, recuperamos su premio anterior
            mostrarPremio(parseFloat(sesionGuardada));
        } else {
            // Es la primera vez que activa este código
            const suerte = Math.random();
            mostrarPremio(suerte);
        }
        
        prepararCanvas();
    }

    // 3. ASIGNAR PREMIO (Probabilidad 1% y 3%)
    function mostrarPremio(valorSuerte) {
        if (valorSuerte < 0.01) {
            textoPremio.innerText = "🎉 ¡GANASTE 1 GALLETA GRANDE!";
            textoPremio.style.color = "#e65100";
        } else if (valorSuerte < 0.04) {
            textoPremio.innerText = "🍪 ¡GANASTE 3 MINI GALLETAS!";
            textoPremio.style.color = "#2e7d32";
        } else {
            textoPremio.innerText = "😢 Sigue intentando";
            textoPremio.style.color = "#777";
        }
        // Guardamos el valor de suerte para que si refresca, el premio sea el mismo
        localStorage.setItem("sesion_bites", valorSuerte);
    }

    function prepararCanvas() {
        ctx.fillStyle = "#999";
        ctx.fillRect(0, 0, 300, 150);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.textAlign = "center";
        ctx.fillText("RASPA CON CUIDADO", 150, 80);
    }

    // 4. LÓGICA DE RASPADO
    function raspar(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
        const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;

        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();

        // Bloqueo de seguridad definitivo: después de raspar 
        // ya no podrá usar otros códigos por 24 horas
        localStorage.setItem("bloqueo_total", Date.now());
    }

    // Seguridad extra: Si ya pasaron a la fase de raspe en el pasado
    if (localStorage.getItem("bloqueo_total")) {
        const tiempo = Date.now() - localStorage.getItem("bloqueo_total");
        if (tiempo < (24 * 60 * 60 * 1000)) { // 24 horas
            // Solo dejamos entrar si el usuario está a mitad de un raspe (refrescó)
            // Si no, mostramos que ya participó. 
            // Para este ejemplo simple, permitimos refrescar el premio actual.
        }
    }

    // Eventos
    let presionado = false;
    canvas.addEventListener("mousedown", () => presionado = true);
    window.addEventListener("mouseup", () => presionado = false);
    canvas.addEventListener("mousemove", (e) => { if(presionado) raspar(e); });
    canvas.addEventListener("touchmove", (e) => { e.preventDefault(); raspar(e); }, { passive: false });

</script>
</body>
</html>
