<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa y Gana</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f1f8e9;
}

canvas{
margin-top:20px;
border:2px solid black;
border-radius:10px;
touch-action:none;
}
</style>
</head>

<body>

<h2>🎁 Raspa y gana</h2>
<p>Raspa el cuadro 👇</p>

<canvas id="canvas" width="300" height="150"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// 🎯 PROBABILIDAD
let r = Math.random();
let premio = "";

if(r < 0.025){
premio = "🎉 GANASTE 1 GRANDE";
}else if(r < 0.05){
premio = "🎉 GANASTE 3 MINI";
}else{
premio = "😢 Sigue intentando";
}

// 🧾 1. DIBUJAR PREMIO (ABAJO)
ctx.fillStyle = "#ffffff";
ctx.fillRect(0,0,300,150);

ctx.fillStyle = "#000";
ctx.font = "bold 18px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(premio,150,75);

// 🟫 2. CAPA GRIS ENCIMA
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "#888";
ctx.fillRect(0,0,300,150);

// 🎮 3. FUNCION RASPAR
function raspar(x,y){
ctx.globalCompositeOperation = "destination-out";
ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();
}

// 🖱️ PC
let presionado = false;

canvas.addEventListener("mousedown", () => presionado = true);
canvas.addEventListener("mouseup", () => presionado = false);

canvas.addEventListener("mousemove", e => {
if(!presionado) return;
let rect = canvas.getBoundingClientRect();
raspar(e.clientX - rect.left, e.clientY - rect.top);
});

// 📱 CELULAR
canvas.addEventListener("touchmove", e => {
e.preventDefault();
let rect = canvas.getBoundingClientRect();
let touch = e.touches[0];
raspar(touch.clientX - rect.left, touch.clientY - rect.top);
});
</script>

</body>
</html>
